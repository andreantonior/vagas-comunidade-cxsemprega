<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vagas de Emprego da Comunidade</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

header{

color:white;
padding:30px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
margin-top:10px;
background:#27ae60;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>Painel de Vagas de Emprego</h1>

</header>

<div class="container">

<h2>Vagas da Comunidade</h2>

<div class="grid">

<div class="card">

<h3>Agente de Vendas de Serviços</h3>

</div>

</div>

</body>

</html>
